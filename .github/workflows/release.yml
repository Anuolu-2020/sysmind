name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '18'

permissions:
  contents: write
  pages: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.result }}
      tag_name: ${{ steps.get_tag.outputs.tag_name }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Get tag name
      id: get_tag
      run: echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
    - name: Create Release
      id: create_release
      uses: actions/github-script@v6
      with:
        script: |
          const { data } = await github.rest.repos.createRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            tag_name: '${{ steps.get_tag.outputs.tag_name }}',
            name: 'SysMind ${{ steps.get_tag.outputs.tag_name }}',
            body: 'Release ${{ steps.get_tag.outputs.tag_name }}',
            draft: false,
            prerelease: false,
          });
          return data.id

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            platform: linux/amd64
            extension: ''
            
          - name: linux-arm64
            os: ubuntu-latest
            platform: linux/arm64
            extension: ''
            
          - name: darwin-amd64
            os: macos-latest
            platform: darwin/amd64
            extension: ''
            
          - name: darwin-arm64
            os: macos-latest
            platform: darwin/arm64
            extension: ''
            
          - name: windows-amd64
            os: windows-latest
            platform: windows/amd64
            extension: '.exe'

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install Wails CLI
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
        
     - name: Install Go dependencies
       run: go mod download
       
     - name: Install Linux dependencies
       if: matrix.os == 'ubuntu-latest'
       run: |
         sudo apt-get update
         sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev
       
     - name: Install UPX (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
          sudo apt-get update && sudo apt-get install -y upx-ucl
        elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
          brew install upx
        fi
        
    - name: Install UPX (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        choco install upx
        
    - name: Build application
      run: |
        # Get version information for ldflags
        VERSION="${{ needs.create-release.outputs.tag_name }}"
        GIT_COMMIT="${{ github.sha }}"
        GIT_TAG="${{ needs.create-release.outputs.tag_name }}"
        BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        BUILD_USER="github-actions"
        
        # Build ldflags
        LDFLAGS="-X 'sysmind/internal/version.Version=${VERSION}' \
                 -X 'sysmind/internal/version.GitCommit=${GIT_COMMIT}' \
                 -X 'sysmind/internal/version.GitTag=${GIT_TAG}' \
                 -X 'sysmind/internal/version.BuildDate=${BUILD_DATE}' \
                 -X 'sysmind/internal/version.BuildUser=${BUILD_USER}'"
        
        wails build -clean -platform ${{ matrix.platform }} -upx -s -ldflags "$LDFLAGS"
        
    - name: Get binary name
      id: binary_name
      run: |
        if [[ "${{ matrix.platform }}" == *"windows"* ]]; then
          echo "binary_name=sysmind.exe" >> $GITHUB_OUTPUT
        else
          echo "binary_name=sysmind" >> $GITHUB_OUTPUT
        fi
      shell: bash
      
    - name: Prepare release artifact
      run: |
        cd build/bin
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          7z a "sysmind-${{ needs.create-release.outputs.tag_name }}-${{ matrix.name }}.zip" sysmind.exe
        else
          tar -czf "sysmind-${{ needs.create-release.outputs.tag_name }}-${{ matrix.name }}.tar.gz" sysmind
        fi
      shell: bash
      
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: https://uploads.github.com/repos/${{ github.repository }}/releases/${{ needs.create-release.outputs.release_id }}/assets{?name,label}
        asset_path: build/bin/sysmind-${{ needs.create-release.outputs.tag_name }}-${{ matrix.name }}${{ matrix.os == 'windows-latest' && '.zip' || '.tar.gz' }}
        asset_name: sysmind-${{ needs.create-release.outputs.tag_name }}-${{ matrix.name }}${{ matrix.os == 'windows-latest' && '.zip' || '.tar.gz' }}
        asset_content_type: ${{ matrix.os == 'windows-latest' && 'application/zip' || 'application/gzip' }}

  update-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Generate changelog
      id: changelog
      run: |
        # Get the previous tag
        PREV_TAG=$(git tag --sort=-version:refname | grep -v "${{ needs.create-release.outputs.tag_name }}" | head -n1)
        
        # Generate changelog
        if [ -n "$PREV_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"* %s (%h)" $PREV_TAG..${{ needs.create-release.outputs.tag_name }})
        else
          CHANGELOG=$(git log --pretty=format:"* %s (%h)" ${{ needs.create-release.outputs.tag_name }})
        fi
        
        # Create release body
        cat > release_body.md << 'EOF'
        ## What's New in ${{ needs.create-release.outputs.tag_name }}
        
        $CHANGELOG
        
        ## Downloads
        
        Choose the appropriate binary for your platform:
        
        ### Linux
        - **AMD64**: `sysmind-${{ needs.create-release.outputs.tag_name }}-linux-amd64.tar.gz`
        - **ARM64**: `sysmind-${{ needs.create-release.outputs.tag_name }}-linux-arm64.tar.gz`
        
        ### macOS  
        - **Intel**: `sysmind-${{ needs.create-release.outputs.tag_name }}-darwin-amd64.tar.gz`
        - **Apple Silicon**: `sysmind-${{ needs.create-release.outputs.tag_name }}-darwin-arm64.tar.gz`
        
        ### Windows
        - **AMD64**: `sysmind-${{ needs.create-release.outputs.tag_name }}-windows-amd64.zip`
        
        ## Installation
        
        1. Download the appropriate binary for your platform
        2. Extract the archive
        3. Run the `sysmind` executable
        
        For detailed setup instructions, see the [README](https://github.com/${{ github.repository }}/blob/main/README.md).
        
        ## Verification
        
        All binaries are automatically built and signed by GitHub Actions.
        EOF
        
    - name: Update Release Description
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const releaseBody = fs.readFileSync('release_body.md', 'utf8');
          
          await github.rest.repos.updateRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: '${{ needs.create-release.outputs.release_id }}',
            body: releaseBody
          });